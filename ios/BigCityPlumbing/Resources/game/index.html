<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Pipe Drop</title>
<style>
  :root {
    --brand-blue: #1976D2;
    --brand-blue-dark: #0D47A1;
    --brand-blue-light: #63A4FF;
    --brand-orange: #FF6F00;
    --brand-orange-dark: #C43E00;
    --text: #111418;
    --text-2: #5A6470;
    --text-3: #8A95A1;
    --surface: #FFFFFF;
    --surface-var: #EFF3F8;
    --tile-light: #FCFCFA;
    --tile-dark: #EEF0F2;
    --grout: #103667;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; touch-action: manipulation; user-select: none; -webkit-user-select: none; }
  body {
    /* position:fixed + inset:0 forces the body to exactly fill the viewport.
       WKWebView (iOS) can leave a %-height flex body collapsed, which zeroed
       out the board; this makes the height definite everywhere. */
    position: fixed;
    inset: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    color: var(--text);
    background: var(--surface);
    display: flex;
    flex-direction: column;
  }
  header {
    padding: max(8px, env(safe-area-inset-top)) 16px 4px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .nav-btn {
    width: 36px; height: 36px; border-radius: 10px; border: 0;
    background: var(--surface-var); color: var(--text);
    font-size: 20px; line-height: 1; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .nav-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .title-block { flex: 1; text-align: center; }
  .title-block .level { font-size: 12px; color: var(--text-2); font-weight: 600; letter-spacing: 0.04em; }
  .title-block .name { font-size: 18px; font-weight: 700; line-height: 1.15; }
  .stats {
    padding: 0 16px 4px;
    display: flex; justify-content: space-between;
    font-size: 13px; color: var(--text-2);
  }
  .stats b { color: var(--text); }
  #board-wrap {
    flex: 1 1 auto;
    min-height: 0;
    margin: 0;
    border-radius: 0;
    background: var(--grout);
    overflow: hidden;
    position: relative;
  }
  canvas { display: block; width: 100%; height: 100%; touch-action: none; }
  .actions {
    padding: 8px 16px calc(8px + env(safe-area-inset-bottom));
    display: flex;
    gap: 12px;
  }
  .btn {
    flex: 1;
    height: 48px;
    border-radius: 14px;
    border: 0;
    font-size: 17px;
    font-weight: 700;
    color: white;
    background: var(--brand-orange);
    display: flex; align-items: center; justify-content: center; gap: 8px;
    cursor: pointer;
    transition: transform 0.06s, background 0.12s;
  }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn.secondary {
    flex: 0 0 130px;
    background: transparent;
    color: var(--brand-blue);
    border: 2px solid var(--brand-blue);
  }
  .btn svg { width: 22px; height: 22px; }
  .hint {
    text-align: center;
    font-size: 11px;
    color: var(--text-2);
    padding: 4px 16px 2px;
  }
  /* Overlay (win/fail) */
  .overlay-bg {
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.35);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s;
    z-index: 10;
  }
  .overlay-bg.show { opacity: 1; pointer-events: auto; }
  .overlay {
    background: white;
    border-radius: 20px;
    padding: 28px 32px;
    text-align: center;
    box-shadow: 0 12px 30px rgba(0,0,0,0.25);
    max-width: 280px;
    transform: scale(0.92);
    transition: transform 0.2s;
  }
  .overlay-bg.show .overlay { transform: scale(1); }
  .overlay .icon {
    font-size: 52px;
    margin-bottom: 8px;
    color: var(--brand-orange);
  }
  .overlay h2 { font-size: 22px; font-weight: 800; margin-bottom: 4px; }
  .overlay p { color: var(--text-2); margin-bottom: 14px; font-size: 14px; }
  .overlay-actions { display: flex; gap: 10px; }
  .overlay-actions .btn { height: 44px; font-size: 15px; }
  .overlay-actions .btn.replay {
    background: transparent;
    color: var(--brand-blue);
    border: 2px solid var(--brand-blue);
  }
</style>
</head>
<body>
  <header>
    <button class="nav-btn" id="home" aria-label="Home" style="display:none">🏠</button>
    <button class="nav-btn" id="prev" aria-label="Previous level">‹</button>
    <div class="title-block">
      <div class="level" id="lvlNum">LEVEL 1 OF 12</div>
      <div class="name" id="lvlName">First Drop</div>
    </div>
    <button class="nav-btn" id="next" aria-label="Next level">›</button>
    <button class="nav-btn" id="mute" aria-label="Toggle sound">🔊</button>
  </header>
  <div class="stats">
    <span><b id="moves">0</b> rotations</span>
    <span id="best"></span>
  </div>
  <div id="board-wrap">
    <canvas id="board"></canvas>
    <div class="overlay-bg" id="overlay">
      <div class="overlay">
        <div class="icon" id="overlayIcon">✓</div>
        <h2 id="overlayTitle">Level Cleared!</h2>
        <p id="overlaySub">9 rotations</p>
        <div class="overlay-actions">
          <button class="btn replay" id="btnReplay">Replay</button>
          <button class="btn" id="btnContinue">Next Level</button>
        </div>
      </div>
    </div>
  </div>
  <div class="actions">
    <button class="btn" id="btnDrop">
      Drop ball
    </button>
    <button class="btn secondary" id="btnReset">↻ Reset</button>
  </div>

<script>
"use strict";

    d.id = "__err";
    d.style.cssText = "position:fixed;left:0;right:0;top:0;z-index:99999;background:#c00;color:#fff;font:12px monospace;padding:6px;white-space:pre-wrap;";
    (document.body || document.documentElement).appendChild(d);
  }
  d.textContent = "JS ERROR: " + msg + "  @" + line + ":" + col;
  return false;
};

// ===========================================================================
// Sound — tiny procedural Web Audio SFX (no files, offline, royalty-free).
// Created lazily on the first user gesture to satisfy mobile autoplay policy.
// ===========================================================================
const Sound = (function () {
  let ctx = null;
  let muted = false;
  try { muted = localStorage.getItem("pipeDropMute") === "1"; } catch (e) {}
  function ac() {
    if (!ctx) {
      const AC = window.AudioContext || window.webkitAudioContext;
      if (AC) { try { ctx = new AC(); } catch (e) {} }
    }
    if (ctx && ctx.state === "suspended") ctx.resume();
    return ctx;
  }
  function tone(freq, dur, type, gain, delay, slideTo) {
    const c = ac();
    if (!c || muted) return;
    const t0 = c.currentTime + (delay || 0);
    const o = c.createOscillator();
    const g = c.createGain();
    o.type = type || "sine";
    o.frequency.setValueAtTime(freq, t0);
    if (slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, t0 + dur);
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(gain, t0 + 0.012);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    o.connect(g).connect(c.destination);
    o.start(t0);
    o.stop(t0 + dur + 0.03);
  }
  // Filtered white-noise burst — used for the water-rush flood sound.
  function noise(dur, gain, delay, lp) {
    const c = ac();
    if (!c || muted) return;
    const t0 = c.currentTime + (delay || 0);
    const n = Math.max(1, Math.floor(c.sampleRate * dur));
    const buf = c.createBuffer(1, n, c.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < n; i++) d[i] = Math.random() * 2 - 1;
    const src = c.createBufferSource(); src.buffer = buf;
    const g = c.createGain();
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(gain, t0 + 0.05);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    let node = src;
    if (lp) { const f = c.createBiquadFilter(); f.type = "lowpass"; f.frequency.value = lp; src.connect(f); node = f; }
    node.connect(g).connect(c.destination);
    src.start(t0); src.stop(t0 + dur + 0.03);
  }
  return {
    rotate: function () { tone(460, 0.05, "square", 0.07, 0); tone(690, 0.05, "square", 0.05, 0.04); },
    drop:   function () { tone(640, 0.45, "sine", 0.13, 0, 150); },
    win:    function () { [523, 659, 784, 1047].forEach(function (f, i) { tone(f, 0.20, "sine", 0.16, i * 0.10); }); },
    fail:   function () { tone(240, 0.38, "sawtooth", 0.11, 0, 110); },
    flood:  function () {
      // Water-rush whoosh (filtered noise) layered with a harsh 3-blast buzzer.
      noise(0.9, 0.16, 0, 900); noise(0.6, 0.10, 0.28, 1600);
      tone(150, 0.22, "square", 0.16, 0.05);
      tone(150, 0.22, "square", 0.16, 0.36);
      tone(115, 0.30, "square", 0.16, 0.68);
    },
    tension: function (intensity) {
      // One menacing beat of the rising-water "countdown" music. A harsh sawtooth
      // fundamental + sub-bass rumble, with a dissonant tritone ("diabolus in
      // musica") that swells in as intensity (the flood level, 0..1) grows.
      const base = 52 + intensity * 46;                         // ~52 -> ~98 Hz, dark
      tone(base, 0.22, "sawtooth", 0.13, 0);                    // harsh fundamental
      tone(base * 0.5, 0.26, "sine", 0.10, 0);                  // sub-bass rumble
      tone(base * 1.414, 0.16, "sawtooth", 0.03 + 0.08 * intensity, 0.02); // tritone
    },
    isMuted: function () { return muted; },
    toggle: function () {
      muted = !muted;
      try { localStorage.setItem("pipeDropMute", muted ? "1" : "0"); } catch (e) {}
      if (!muted) ac();
      return muted;
    },
  };
})();

const Side = { Up: 0, Right: 1, Down: 2, Left: 3 };

const DY = [-1, 0, 1, 0];
const OPP = [Side.Down, Side.Left, Side.Up, Side.Right];

// Shape base connections (rotation = 0)
const SHAPES = {
  straight: [Side.Left, Side.Right],
  elbow:    [Side.Right, Side.Down],
  tee:      [Side.Left, Side.Right, Side.Down],
  cross:    [Side.Up, Side.Right, Side.Down, Side.Left],
  entry:    [Side.Down],
  exit:     [Side.Up],
};

function rotated(side, steps) {
  return ((side + steps) % 4 + 4) % 4;
}

function tileConnections(tile) {
  return SHAPES[tile.shape].map(s => rotated(s, tile.rot || 0));
}

// ===========================================================================
// Board state
// ===========================================================================
let levelIdx = 0;
let board = null;   // { cols, rows, entry, exit, tiles: Map<key, tile> }
let moves = 0;
let dropping = false;
let dropProgress = null;    // { path: [pos], step: int, t: 0..1 }
let win = false;
let fail = false;

// Rising-water timer ("flood the puzzle"). floodLevel is 0..1 of the board
// height; the player must connect the pipes and Drop the ball (which drains it)
// before it reaches the top.
let flooded = false;       // board has fully flooded (lost)
let floodActive = false;   // water is currently rising
let floodLevel = 0;        // 0 = empty, 1 = full
let floodDuration = 30000; // ms to fill, set per level in loadLevel
let floodLast = 0;         // timestamp of last flood tick
let tensionTimer = 0;      // ms accumulated toward the next tension beat

function key(x, y) { return x + "," + y; }

function loadLevel(idx) {
  levelIdx = idx;
  const L = LEVELS[idx];
  board = {
    cols: L.cols, rows: L.rows, entry: L.entry, exit: L.exit,
    tiles: new Map(),
  };
  board.tiles.set(key(L.entry, 0),        { x: L.entry, y: 0,            shape: "entry", rot: 0, locked: true });
  board.tiles.set(key(L.exit,  L.rows-1), { x: L.exit,  y: L.rows - 1,   shape: "exit",  rot: 0, locked: true });
  for (const t of L.tiles) {
    board.tiles.set(key(t.x, t.y), { x: t.x, y: t.y, shape: t.shape, rot: t.rot, locked: false });
  }
  moves = 0;
  dropping = false;
  dropProgress = null;
  win = false; fail = false;
  // More time on bigger puzzles: ~20s plus 2.5s per pipe.
  floodDuration = (20 + L.tiles.length * 2.5) * 1000;
  document.getElementById("overlay").classList.remove("show");
  updateHud();
  resize();
  draw();
  startFlood();
}

// ---- Rising-water timer -------------------------------------------------
function floodTick(now) {
  if (!floodActive) return;
  // Clamp dt so a paused/backgrounded tab (throttled rAF) can't jump the level
  // straight to full — this also naturally freezes the timer while off-screen.
  const dt = Math.min(100, now - floodLast);
  floodLast = now;
  floodLevel = Math.min(1, floodLevel + dt / floodDuration);
  // Impending "countdown" music: beats accelerate as the room fills.
  tensionTimer += dt;
  // pow(<1) ramps the tempo up early; floor ~130ms = frantic near the top.
  const beatInterval = 900 - 770 * Math.pow(floodLevel, 0.7);   // ~900ms -> ~130ms
  if (tensionTimer >= beatInterval) { tensionTimer = 0; Sound.tension(floodLevel); }
  draw();
  if (floodLevel >= 1) { triggerFlood(); return; }
  requestAnimationFrame(floodTick);
}
function startFlood() {
  flooded = false;
  floodLevel = 0;
  tensionTimer = 0;
  resumeFlood();
}
function resumeFlood() {
  if (flooded || win || dropping) return;
  floodActive = true;
  floodLast = performance.now();
  requestAnimationFrame(floodTick);
}
function pauseFlood() { floodActive = false; }
function triggerFlood() {
  floodActive = false;
  flooded = true;
  floodLevel = 1;
  draw();
  Sound.flood();
  if (navigator.vibrate) navigator.vibrate([120, 60, 120, 60, 240]);
  showOverlay(false, "Too late!", "Drain pipe not connected — room flooded! Try again!",
              () => loadLevel(levelIdx));
}

function bfsReachable() {
  const visited = new Set([key(board.entry, 0)]);
  const queue = [{ x: board.entry, y: 0 }];
  while (queue.length) {
    const p = queue.shift();
    const tile = board.tiles.get(key(p.x, p.y));
    if (!tile) continue;
    for (const side of tileConnections(tile)) {
      const nx = p.x + DX[side], ny = p.y + DY[side];
      const nk = key(nx, ny);
      if (visited.has(nk)) continue;
      const n = board.tiles.get(nk);
      if (!n) continue;
      const back = OPP[side];
      if (tileConnections(n).includes(back)) {
        visited.add(nk);
        queue.push({ x: nx, y: ny });
      }
    }
  }
  return visited;
}

function ballPath() {
  const parent = new Map();
  const visited = new Set([key(board.entry, 0)]);
  const queue = [{ x: board.entry, y: 0 }];
  let endNode = null;
  while (queue.length) {
    const p = queue.shift();
    if (p.x === board.exit && p.y === board.rows - 1) { endNode = p; break; }
    const tile = board.tiles.get(key(p.x, p.y));
    if (!tile) continue;
    for (const side of tileConnections(tile)) {
      const nx = p.x + DX[side], ny = p.y + DY[side];
      const nk = key(nx, ny);
      if (visited.has(nk)) continue;
      const n = board.tiles.get(nk);
      if (!n) continue;
      const back = OPP[side];
      if (tileConnections(n).includes(back)) {
        visited.add(nk);
        parent.set(nk, p);
        queue.push({ x: nx, y: ny });
      }
    }
  }
  if (!endNode) return null;
  const path = [];
  let cur = endNode;
  while (cur) {
    path.unshift(cur);
    cur = parent.get(key(cur.x, cur.y));
  }
  return path;
}

// ===========================================================================
// Rendering — chrome pipes drawn with consistent diameter
// ===========================================================================
const canvas = document.getElementById("board");
const ctx = canvas.getContext("2d");
let cell = 60;
let originX = 0, originY = 0;
let DPR = window.devicePixelRatio || 1;

function chromeHeight(sel) {
  const el = document.querySelector(sel);
  return el ? el.offsetHeight : 0;
}

function resize() {
  const wrap = document.getElementById("board-wrap");
  // Some WebViews (notably iOS WKWebView) don't give the flex board any height.
  // If that happens, force a concrete height from the window minus the chrome.
  if (wrap.clientHeight < 40) {
    const chrome = chromeHeight("header") + chromeHeight(".stats")
                 + chromeHeight(".hint") + chromeHeight(".actions");
    const avail = window.innerHeight - chrome - 16;
    if (avail > 60) {
      wrap.style.flex = "0 0 auto";
      wrap.style.height = avail + "px";
    }
  }
  const W = wrap.clientWidth;
  const H = wrap.clientHeight;
  if (W < 10 || H < 10) return; // nothing to size yet
  canvas.width = Math.round(W * DPR);
  canvas.height = Math.round(H * DPR);
  canvas.style.width = W + "px";
  canvas.style.height = H + "px";
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  // Compute cell size
  cell = Math.min(W / board.cols, H / board.rows);
  originX = (W - cell * board.cols) / 2;
  originY = (H - cell * board.rows) / 2;
}

// Tap-Pipe-style warm yellow board with a faint grid + bolt dots, which makes
// the gray steel pipes read clearly.
function drawGrid(x, y, w, h) {
  ctx.save();
  ctx.strokeStyle = "rgba(255,255,255,0.08)";
  ctx.lineWidth = Math.max(1, cell * 0.02);
  ctx.beginPath();
  for (let c = 0; c <= board.cols; c++) { ctx.moveTo(x + c * cell, y); ctx.lineTo(x + c * cell, y + h); }
  for (let r = 0; r <= board.rows; r++) { ctx.moveTo(x, y + r * cell); ctx.lineTo(x + w, y + r * cell); }
  ctx.stroke();
  ctx.fillStyle = "rgba(255,255,255,0.10)";
  for (let c = 0; c <= board.cols; c++)
    for (let r = 0; r <= board.rows; r++) {
      ctx.beginPath();
      ctx.arc(x + c * cell, y + r * cell, Math.max(1.2, cell * 0.035), 0, Math.PI * 2);
      ctx.fill();
    }
  ctx.restore();
}

// Gray steel pipes (Tap-Pipe look) with bright cyan water flowing inside.
// Toggle ROUND_ELBOWS: true = rounded bends like Tap Pipe, false = sharp 90°.
const ROUND_ELBOWS = true;
const STEEL = { rim: "#3D454E", body: "#8B95A0", sheen: "#C4CCD3", flange: "#2E353C" };
const WATER = { fill: "#23BEEF", top: "#86E2FF" };

function tubeWidths() {
  return {
    outer:    cell * 0.52,   // dark casing edge
    body:     cell * 0.42,   // bright steel face
    sheen:    cell * 0.16,   // cylindrical highlight
    water:    cell * 0.40,   // water stream — fills to the inner pipe wall
    waterTop: cell * 0.12,   // lighter water highlight
  };
}

// Stroke a pipe centerline as a layered steel tube.
function strokeMetal(path) {
  const w = tubeWidths();
  ctx.save();
  ctx.lineJoin = ROUND_ELBOWS ? "round" : "miter";
  ctx.lineCap = "butt";          // flat pipe ends (flanges, not rounded caps)
  ctx.miterLimit = 8;
  ctx.strokeStyle = STEEL.rim;   ctx.lineWidth = w.outer; ctx.stroke(path);
  ctx.strokeStyle = STEEL.body;  ctx.lineWidth = w.body;  ctx.stroke(path);
  ctx.restore();
}

// Stroke flowing water along a (possibly partial) pipe path.
function strokeWater(path) {
  const w = tubeWidths();
  ctx.save();
  ctx.lineJoin = ROUND_ELBOWS ? "round" : "miter";
  ctx.lineCap = "round";
  ctx.strokeStyle = WATER.fill; ctx.lineWidth = w.water; ctx.stroke(path);
  ctx.restore();
}

function sideMid(cx, cy, side) {
  const half = cell / 2;
  return { x: cx + DX[side] * half, y: cy + DY[side] * half };
}

// Coupling collars (darker rings) at each open side, like Tap Pipe's joints.
function drawFlanges(tile) {
  const cx = originX + (tile.x + 0.5) * cell;
  const cy = originY + (tile.y + 0.5) * cell;
  const half = cell / 2;
  const w = tubeWidths();
  let sides;
  if (tile.shape === "entry") sides = [Side.Down];
  else if (tile.shape === "exit") sides = [Side.Up];
  else sides = tileConnections(tile);
  ctx.save();
  ctx.lineCap = "butt";
  const len = w.outer * 0.60;
  for (const s of sides) {
    const px = cx + DX[s] * half * 0.78;
    const py = cy + DY[s] * half * 0.78;
    const perpX = -DY[s], perpY = DX[s];
    ctx.strokeStyle = STEEL.flange;
    ctx.lineWidth = cell * 0.08;
    ctx.beginPath();
    ctx.moveTo(px - perpX * len, py - perpY * len);
    ctx.lineTo(px + perpX * len, py + perpY * len);
    ctx.stroke();
    ctx.strokeStyle = "rgba(255,255,255,0.16)";
    ctx.lineWidth = cell * 0.022;
    ctx.beginPath();
    ctx.moveTo(px - perpX * len, py - perpY * len);
    ctx.lineTo(px + perpX * len, py + perpY * len);
    ctx.stroke();
  }
  ctx.restore();
}

// Funnel flaring away from the grid edge (dir: -1 up for entry, +1 down for exit).
function drawFunnel(cx, edgeY, dir) {
  const w = tubeWidths();
  const mouthY = edgeY + dir * cell * 0.17;
  const outerHalf = w.outer * 0.95;
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(cx - w.outer / 2, edgeY);
  ctx.lineTo(cx - outerHalf, mouthY);
  ctx.lineTo(cx + outerHalf, mouthY);
  ctx.lineTo(cx + w.outer / 2, edgeY);
  ctx.closePath();
  ctx.fillStyle = STEEL.body; ctx.fill();
  ctx.lineWidth = Math.max(1.5, cell * 0.03); ctx.strokeStyle = STEEL.flange; ctx.stroke();
  // dark mouth
  ctx.beginPath();
  ctx.moveTo(cx - w.water / 2, edgeY);
  ctx.lineTo(cx - outerHalf * 0.5, mouthY);
  ctx.lineTo(cx + outerHalf * 0.5, mouthY);
  ctx.lineTo(cx + w.water / 2, edgeY);
  ctx.closePath();
  ctx.fillStyle = "#5A636C"; ctx.fill();
  ctx.restore();
}

function drawTile(tile) {
  const cx = originX + (tile.x + 0.5) * cell;
  const cy = originY + (tile.y + 0.5) * cell;
  const half = cell / 2;

  if (tile.shape === "entry" || tile.shape === "exit") {
    // Vertical stem spanning the cell, plus a funnel at the open edge.
    const p = new Path2D();
    p.moveTo(cx, cy - half);
    p.lineTo(cx, cy + half);
    strokeMetal(p);
    drawFlanges(tile);
    if (tile.shape === "entry") drawFunnel(cx, cy - half, -1);
    else drawFunnel(cx, cy + half, +1);
    return;
  }

  const conns = tileConnections(tile);
  const p = new Path2D();

  if (conns.length === 2) {
    // Straight or elbow: route through the cell center.
    const a = sideMid(cx, cy, conns[0]), b = sideMid(cx, cy, conns[1]);
    p.moveTo(a.x, a.y); p.lineTo(cx, cy); p.lineTo(b.x, b.y);
  } else if (conns.length === 3) {
    // Tee — straight run through the opposite pair + a stub to the third side.
    let pair = null;
    for (let i = 0; i < conns.length; i++)
      for (let j = i + 1; j < conns.length; j++)
        if (Math.abs(conns[i] - conns[j]) === 2) pair = [conns[i], conns[j]];
    if (pair) {
      const a = sideMid(cx, cy, pair[0]), b = sideMid(cx, cy, pair[1]);
      p.moveTo(a.x, a.y); p.lineTo(b.x, b.y);
      const stub = conns.find(s => s !== pair[0] && s !== pair[1]);
      const s = sideMid(cx, cy, stub);
      p.moveTo(cx, cy); p.lineTo(s.x, s.y);
    }
  } else if (conns.length === 4) {
    // Cross — two straight runs.
    const l = sideMid(cx, cy, Side.Left), r = sideMid(cx, cy, Side.Right);
    const u = sideMid(cx, cy, Side.Up), d = sideMid(cx, cy, Side.Down);
    p.moveTo(l.x, l.y); p.lineTo(r.x, r.y);
    p.moveTo(u.x, u.y); p.lineTo(d.x, d.y);
  }
  strokeMetal(p);
  drawFlanges(tile);
}

function drawMarble(cx, cy, r) {
  // Ball = the embedded brand logo image, clipped into a circle.
  ctx.save();
  // contact shadow
  ctx.beginPath();
  ctx.ellipse(cx, cy + r * 0.95, r * 0.85, r * 0.3, 0, 0, Math.PI * 2);
  ctx.fillStyle = "rgba(0,0,0,0.28)";
  ctx.fill();

  if (logoReady && logoImg.naturalWidth) {
    ctx.save();
    // circular ball with a light backing so the logo's transparent corners read as a ball
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.closePath();
    ctx.fillStyle = "#103667";
    ctx.fill();
    ctx.clip();
    // fit the whole logo inside the circle (contain), centered
    const iw = logoImg.naturalWidth, ih = logoImg.naturalHeight;
    const scale = (2 * r * 0.98) / Math.max(iw, ih);
    const w = iw * scale, h = ih * scale;
    ctx.drawImage(logoImg, cx - w / 2, cy - h / 2, w, h);
    ctx.restore();
  } else {
    // fallback while the image loads
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fillStyle = "#1A3566";
    ctx.fill();
  }

  // glossy highlight + rim
  ctx.beginPath();
  ctx.arc(cx - r * 0.34, cy - r * 0.40, r * 0.22, 0, Math.PI * 2);
  ctx.fillStyle = "rgba(255,255,255,0.40)";
  ctx.fill();
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.lineWidth = Math.max(1, r * 0.08);
  ctx.strokeStyle = "rgba(6,20,45,0.45)";
  ctx.stroke();
  ctx.restore();
}

// Brand logo watermark — draws the embedded logo image, preserving aspect ratio.
function drawLogoBadge(cx, cy, s) {
  if (!logoReady) return;
  const iw = logoImg.naturalWidth, ih = logoImg.naturalHeight;
  if (!iw || !ih) return;
  const targetW = s * 2.3;
  const scale = targetW / iw;
  const w = iw * scale, h = ih * scale;
  ctx.drawImage(logoImg, cx - w / 2, cy - h / 2, w, h);
}

function draw() {
  if (!board) return;
  const W = canvas.width / DPR, H = canvas.height / DPR;
  ctx.clearRect(0, 0, W, H);
  // Board background
  ctx.fillStyle = "#103667";
  ctx.fillRect(0, 0, W, H);
  drawGrid(originX, originY, cell * board.cols, cell * board.rows);

  // Brand logo watermark, 25% opacity, behind the pipes
  const bw = cell * board.cols, bh = cell * board.rows;
  ctx.save();
  ctx.globalAlpha = 0.25;
  drawLogoBadge(originX + bw / 2, originY + bh / 2, Math.min(bw, bh) * 0.34);
  ctx.restore();

  // Steel pipes with coupling flanges
  for (const tile of board.tiles.values()) drawTile(tile);

  // Rising flood water (the timer). Semi-transparent cyan rising from the
  // bottom, with an animated wavy surface; submerged pipes show through, tinted.
  if (floodLevel > 0) {
    const topY = H - H * floodLevel;
    const amp = Math.min(7, cell * 0.12);
    const tt = performance.now() / 320;
    ctx.save();
    ctx.globalAlpha = 0.5;
    ctx.fillStyle = WATER.fill;
    ctx.beginPath();
    ctx.moveTo(0, H);
    ctx.lineTo(0, topY);
    for (let xx = 0; xx <= W; xx += 12) ctx.lineTo(xx, topY + Math.sin(xx / 26 + tt) * amp);
    ctx.lineTo(W, H);
    ctx.closePath();
    ctx.fill();
    ctx.globalAlpha = 0.85;
    ctx.strokeStyle = WATER.top;
    ctx.lineWidth = Math.max(2, cell * 0.045);
    ctx.beginPath();
    for (let xx = 0; xx <= W; xx += 12) {
      const yy = topY + Math.sin(xx / 26 + tt) * amp;
      if (xx === 0) ctx.moveTo(xx, yy); else ctx.lineTo(xx, yy);
    }
    ctx.stroke();
    ctx.restore();
  }

  // Water flowing along the connected path (fills behind the marble; stays full on win)
  if (dropProgress && (dropping || win)) {
    strokeWater(waterTrailPath(dropProgress.dist));
  }

  // Logo marble. During the drop it flows through the pipes; otherwise it floats
  // on the surface of the rising flood water, bobbing and rising as the room
  // fills — then gets carried into the pipes when the player drops it.
  const r = cell * 0.205;
  let mx, my;
  if (dropping && dropProgress) {
    const pos = marblePosAt(dropProgress.dist);
    mx = originX + pos.cx * cell; my = originY + pos.cy * cell;
  } else if (win && dropProgress) {
    const e = dropProgress.wp[dropProgress.wp.length - 1];
    mx = originX + e.cx * cell; my = originY + e.cy * cell;
  } else {
    // Float on the water surface, lined up over the entry pipe, bobbing gently.
    const surfaceY = H - H * floodLevel;
    const tt = performance.now() / 360;
    mx = originX + (board.entry + 0.5) * cell + Math.sin(tt) * r * 0.5;
    my = Math.min(H - r * 0.5, surfaceY - r * 0.35 + Math.sin(tt * 1.7) * r * 0.18);
  }
  drawMarble(mx, my, r);
}

// ===========================================================================
// Interaction
// ===========================================================================
function tileAtPoint(px, py) {
  const x = Math.floor((px - originX) / cell);
  const y = Math.floor((py - originY) / cell);
  if (x < 0 || y < 0 || x >= board.cols || y >= board.rows) return null;
  return board.tiles.get(key(x, y)) || null;
}

canvas.addEventListener("pointerdown", e => {
  if (dropping || win || flooded) return;
  const rect = canvas.getBoundingClientRect();
  const tile = tileAtPoint(e.clientX - rect.left, e.clientY - rect.top);
  if (!tile || tile.locked) return;
  tile.rot = (tile.rot + 1) % 4;
  moves++;
  fail = false;
  updateHud();
  draw();
  Sound.rotate();
  if (navigator.vibrate) navigator.vibrate(8);
});

// Long press to flip (counter-clockwise)
let longPressTimer = null;
let longPressFired = false;
canvas.addEventListener("pointerdown", e => {
  longPressFired = false;
  longPressTimer = setTimeout(() => {
    if (dropping || win || flooded) return;
    const rect = canvas.getBoundingClientRect();
    const tile = tileAtPoint(e.clientX - rect.left, e.clientY - rect.top);
    if (!tile || tile.locked) return;
    // Undo the click rotation and apply CCW instead
    tile.rot = (tile.rot + 3) % 4;       // CCW
    tile.rot = (tile.rot + 3) % 4;       // undo prior CW
    longPressFired = true;
    Sound.rotate();
    if (navigator.vibrate) navigator.vibrate(18);
    draw();
  }, 420);
});
const cancelLongPress = () => { if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; } };
["pointerup", "pointercancel", "pointerleave", "pointermove"].forEach(ev =>
  canvas.addEventListener(ev, cancelLongPress)
);

document.getElementById("btnDrop").addEventListener("click", startDrop);
document.getElementById("btnReset").addEventListener("click", () => loadLevel(levelIdx));
document.getElementById("prev").addEventListener("click", () => loadLevel((levelIdx - 1 + LEVELS.length) % LEVELS.length));
document.getElementById("next").addEventListener("click", () => loadLevel((levelIdx + 1) % LEVELS.length));
document.getElementById("btnReplay").addEventListener("click", () => loadLevel(levelIdx));
document.getElementById("btnContinue").addEventListener("click", () => loadLevel((levelIdx + 1) % LEVELS.length));

// In-game Home button: only meaningful on iOS, where the game runs fullscreen
// with the tab bar hidden. It asks the native app (via the "exitGame" message
// handler) to switch back to the Home tab. On Android/web the handler doesn't
// exist, so the button stays hidden and the platform's own nav is used.
(function () {
  const homeBtn = document.getElementById("home");
  const exitHandler = window.webkit && window.webkit.messageHandlers
    && window.webkit.messageHandlers.exitGame;
  if (exitHandler) {
    homeBtn.style.display = "";
    homeBtn.addEventListener("click", () => exitHandler.postMessage(1));
  }
})();

// Build a fine pixel-independent (grid-coord) waypoint list that threads the
// marble through each port and cell center, so it stays inside the bore at bends.
function buildWaypoints(path) {
  const wp = [];
  wp.push({ cx: path[0].x + 0.5, cy: 0.0 });                 // funnel mouth (top)
  wp.push({ cx: path[0].x + 0.5, cy: path[0].y + 0.5 });     // entry center
  for (let i = 1; i < path.length; i++) {
    const a = path[i - 1], b = path[i];
    wp.push({ cx: (a.x + b.x) / 2 + 0.5, cy: (a.y + b.y) / 2 + 0.5 }); // shared port
    wp.push({ cx: b.x + 0.5, cy: b.y + 0.5 });                        // cell center
  }
  wp.push({ cx: path[path.length - 1].x + 0.5, cy: board.rows });     // exit funnel
  return wp;
}

function marblePosAt(dist) {
  const wp = dropProgress.wp, segLen = dropProgress.segLen;
  let d = dist;
  for (let i = 0; i < segLen.length; i++) {
    if (d <= segLen[i] || i === segLen.length - 1) {
      const t = segLen[i] > 0 ? d / segLen[i] : 0;
      return {
        cx: wp[i].cx + (wp[i + 1].cx - wp[i].cx) * t,
        cy: wp[i].cy + (wp[i + 1].cy - wp[i].cy) * t,
      };
    }
    d -= segLen[i];
  }
  const e = wp[wp.length - 1];
  return { cx: e.cx, cy: e.cy };
}

// Build a Path2D of the pipe path filled with water from the start up to `dist`.
function waterTrailPath(dist) {
  const wp = dropProgress.wp, segLen = dropProgress.segLen;
  const toPx = (p) => ({ x: originX + p.cx * cell, y: originY + p.cy * cell });
  const path = new Path2D();
  const s0 = toPx(wp[0]);
  path.moveTo(s0.x, s0.y);
  let d = dist;
  for (let i = 0; i < segLen.length; i++) {
    if (d >= segLen[i]) {
      const q = toPx(wp[i + 1]);
      path.lineTo(q.x, q.y);
      d -= segLen[i];
    } else {
      const t = segLen[i] > 0 ? d / segLen[i] : 0;
      const a = wp[i], b = wp[i + 1];
      path.lineTo(originX + (a.cx + (b.cx - a.cx) * t) * cell,
                  originY + (a.cy + (b.cy - a.cy) * t) * cell);
      break;
    }
  }
  return path;
}

function startDrop() {
  if (dropping || flooded) return;
  fail = false; win = false;
  const path = ballPath();
  if (!path || path.length < 2) {
    pauseFlood();   // freeze the timer while the "Not quite" prompt is up
    Sound.fail();
    showOverlay(false, "Not quite!", "The pipes don't connect yet — keep rotating.");
    return;
  }
  floodActive = false;   // solved — stop the rise; the ball drains it as it flows
  const wp = buildWaypoints(path);
  const segLen = [];
  let total = 0;
  for (let i = 0; i < wp.length - 1; i++) {
    const l = Math.hypot(wp[i + 1].cx - wp[i].cx, wp[i + 1].cy - wp[i].cy);
    segLen.push(l); total += l;
  }
  dropping = true;
  dropProgress = { wp, segLen, total, dist: 0, path };
  Sound.drop();
  const SPEED = 4.2; // cells per second
  let last = performance.now();
  function frame(now) {
    const dt = now - last; last = now;
    dropProgress.dist += SPEED * dt / 1000;
    if (floodLevel > 0) floodLevel = Math.max(0, floodLevel - dt / 700);  // drain away
    if (dropProgress.dist >= dropProgress.total) {
      dropProgress.dist = dropProgress.total;
      draw();
      finishDrop();
      return;
    }
    draw();
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}

function finishDrop() {
  dropping = false;
  const path = dropProgress.path;
  const end = path[path.length - 1];
  if (end.x === board.exit && end.y === board.rows - 1) {
    win = true;
    floodLevel = 0;   // fully drained
    Sound.win();
    showOverlay(true, "Level Cleared!", moves + " rotations");
    saveBest(levelIdx, moves);
  } else {
    Sound.fail();
    showOverlay(false, "Not quite!", "The marble fell off — keep rotating.");
  }
}

function showOverlay(isWin, title, sub, onRetry) {
  const o = document.getElementById("overlay");
  document.getElementById("overlayIcon").textContent = isWin ? "✓" : "!";
  document.getElementById("overlayTitle").textContent = title;
  document.getElementById("overlaySub").textContent = sub;
  document.getElementById("btnContinue").textContent = isWin ? "Next Level" : "Try Again";
  document.getElementById("btnContinue").onclick = isWin
    ? () => loadLevel((levelIdx + 1) % LEVELS.length)
    : (onRetry || (() => { o.classList.remove("show"); resumeFlood(); }));
  o.classList.add("show");
}

function saveBest(idx, m) {
  try {
    const data = JSON.parse(localStorage.getItem("pipeDropBest") || "{}");
    if (data[idx] === undefined || m < data[idx]) {
      data[idx] = m;
      localStorage.setItem("pipeDropBest", JSON.stringify(data));
    }
    updateHud();
  } catch (e) {}
}

function getBest(idx) {
  try {
    const data = JSON.parse(localStorage.getItem("pipeDropBest") || "{}");
    return data[idx];
  } catch (e) { return undefined; }
}

function updateHud() {
  document.getElementById("lvlNum").textContent = "LEVEL " + (levelIdx + 1) + " OF " + LEVELS.length;
  document.getElementById("lvlName").textContent = LEVELS[levelIdx].name;
  document.getElementById("moves").textContent = String(moves);
  document.getElementById("prev").disabled = false;
  document.getElementById("next").disabled = false;
  const b = getBest(levelIdx);
  document.getElementById("best").textContent = (b !== undefined) ? ("Best: " + b) : "";
}

// ===========================================================================
// Boot
// ===========================================================================
window.addEventListener("resize", () => { resize(); draw(); });

// Re-measure whenever the board actually gets/changes its size. WKWebView (iOS)
// lays out after the script runs, so the first measure can be too early.
if (window.ResizeObserver) {
  const ro = new ResizeObserver(() => { if (board) { resize(); draw(); } });
  ro.observe(document.getElementById("board-wrap"));
}

// Sound toggle (SVG icons render reliably across iOS/Android, unlike emoji).
const ICON_SOUND_ON = '<svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M4 9v6h4l5 5V4L8 9H4z"/><path d="M16 8.5a4 4 0 010 7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>';
const ICON_SOUND_OFF = '<svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M4 9v6h4l5 5V4L8 9H4z"/><path d="M16 9l5 6M21 9l-5 6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>';
const muteBtn = document.getElementById("mute");
function refreshMute() { muteBtn.innerHTML = Sound.isMuted() ? ICON_SOUND_OFF : ICON_SOUND_ON; }
muteBtn.addEventListener("click", () => { Sound.toggle(); refreshMute(); });
refreshMute();

loadLevel(0);
// Belt-and-suspenders: re-measure on the next frame and shortly after, in case
// the WebView hadn't sized the board yet when loadLevel first ran.
requestAnimationFrame(() => { resize(); draw(); });
setTimeout(() => { resize(); draw(); }, 150);

</script>
</body>
</html>
